type: vertical-stack
cards:
  # --- Controls ---
  - type: entities
    title: Tesla Solar Charging
    state_color: true
    entities:
      - entity: switch.solar_charging
        name: Controller
        icon: mdi:solar-power
      - entity: switch.force_charge
        name: Force Charge
        icon: mdi:flash-alert
      - entity: sensor.state
        name: Status
      - entity: sensor.reason
        name: Reason

  # --- Tesla ---
  - type: entities
    title: Tesla
    entities:
      - entity: sensor.tesla_di_luca_battery
        name: Battery SOC
        icon: mdi:car-battery
      - entity: number.tesla_charge_limit
        name: Charge Limit
        icon: mdi:battery-lock
      - entity: device_tracker.tesla_di_luca_location_tracker
        name: Location
        icon: mdi:map-marker

  # --- Power ---
  - type: entities
    title: Power & Grid
    entities:
      - entity: sensor.esp32_deye_inverter_grid_power
        name: Grid Power
        icon: mdi:transmission-tower
      # Replace with your grid voltage entity
      - entity: sensor.esp32_deye_inverter_grid_voltage
        name: Grid Voltage
        icon: mdi:flash
      # Replace with your home battery SOC entity
      - entity: sensor.esp32_deye_inverter_battery_soc
        name: Home Battery SOC
        icon: mdi:battery-high
      # Replace with your home battery power entity
      - entity: sensor.esp32_deye_inverter_battery_power
        name: Home Battery Power
        icon: mdi:battery-charging
      - type: divider
      - entity: sensor.charging_amps
        name: Charging Amps
        icon: mdi:current-ac
      - entity: sensor.net_available
        name: Net Available
        icon: mdi:solar-power-variant

  # --- Forecast & Plan ---
  - type: entities
    title: Forecast & Planning
    entities:
      - entity: sensor.solar_forecast
        name: Tomorrow Forecast
        icon: mdi:weather-sunny
      - entity: sensor.cloud_strategy
        name: Cloud Strategy
        icon: mdi:weather-partly-cloudy
      - entity: sensor.plan
        name: Plan
        icon: mdi:clipboard-text
      - entity: sensor.forecast_accuracy
        name: Correction Factor
        icon: mdi:chart-line

  # --- System Health ---
  - type: entities
    title: System Health
    entities:
      - entity: sensor.ble_status
        name: BLE / ESP32
        icon: mdi:bluetooth-connect
